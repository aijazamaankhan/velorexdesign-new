<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Maintenance — Velorex</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary: #1a0a2e;
            --secondary: #ff6b35;
            --accent: #ffd700;
            --bg: #0d0d0d;
            --text: #f0eaf8;
            --text-muted: #9890b0;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background Particles */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            z-index: 0;
            filter: blur(80px);
            animation: pulse 10s infinite alternate;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(26, 10, 46, 0.8) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            z-index: 0;
            filter: blur(80px);
            animation: pulse 8s infinite alternate-reverse;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
                opacity: 0.5;
            }

            to {
                transform: scale(1.2);
                opacity: 0.8;
            }
        }

        .maintenance-container {
            max-width: 600px;
            width: 90%;
            text-align: center;
            padding: 4rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 30px;
            z-index: 10;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 900;
            margin-bottom: 2rem;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .logo i {
            color: var(--secondary);
            font-size: 2rem;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin-bottom: 1.5rem;
            background: linear-gradient(135deg, #fff 0%, var(--text-muted) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 2.5rem;
        }

        .icon-box {
            width: 80px;
            height: 80px;
            background: rgba(255, 107, 53, 0.1);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--secondary);
            font-size: 2.5rem;
            border: 1px solid rgba(255, 107, 53, 0.2);
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: 50%;
            color: var(--text-muted);
            font-size: 1.1rem;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icon:hover {
            background: var(--secondary);
            color: white;
            border-color: var(--secondary);
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.3);
        }

        /* Toast Styles */
        .toast-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .toast {
            background: rgba(26, 10, 46, 0.95);
            border: 1px solid var(--secondary);
            padding: 1.5rem 2.5rem;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
            color: var(--text);
            animation: centerPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(20px);
            min-width: 300px;
            text-align: center;
            pointer-events: auto;
        }

        @keyframes centerPop {
            from {
                transform: scale(0.8);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .footer-text {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 2px;
            margin-bottom: 2rem;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 40%;
            background: var(--secondary);
            border-radius: 2px;
            animation: progressMove 3s infinite ease-in-out;
        }

        @keyframes progressMove {
            0% {
                left: -40%;
            }

            50% {
                left: 40%;
            }

            100% {
                left: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="maintenance-container">
        <div class="icon-box">
            <i class="fas fa-rocket"></i>
        </div>

        <div class="logo">
            <i class="fas fa-gem"></i> Velorex Design
        </div>

        <h1>Coming Soon</h1>
        <p>We're busy polishing our store to bring you an even better experience. We'll be back shortly with new
            collections and improved services.</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="social-links">
            <a href="#" class="social-icon"><i class="fab fa-youtube"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-instagram"></i></a>
            <a href="#" class="social-icon"><i class="fab fa-whatsapp"></i></a>
        </div>

        <div class="footer-text">
            Stay Tuned • Velorex Family
        </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>

    <script>
        const app = {
            showToast(msg, type = 'info') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-info-circle'}" style="color:var(--secondary); margin-right: 10px;"></i> ${msg}`;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.transition = 'opacity 0.3s ease';
                    toast.style.opacity = '0';
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };
    </script>
</body>

</html>
